name: Instagram Outreach Bot

on:
  schedule:
    - cron: '0 * * * *'   # every hour, 24/7
  workflow_dispatch:        # manual "Run workflow" button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install dependencies + Playwright browser
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run bot
        env:
          IG_COOKIES: ${{ secrets.IG_COOKIES }}
        run: node bot.js

      - name: Save engaged.txt back to repo
        if: always()
        run: |
          git config user.name  "instagram-bot"
          git config user.email "bot@designedby.surya"
          git add engaged.txt bot.log || true
          git diff --cached --quiet || git commit -m "bot run $(date -u +'%Y-%m-%d %H:%M')"
          git push || true
