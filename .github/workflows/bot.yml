name: Instagram Outreach Bot

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC  (~11:30 AM IST)
    - cron: '0 14 * * *'  # 2 PM UTC  (~7:30 PM IST)
  workflow_dispatch:        # manual "Run workflow" button in GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo (includes engaged.txt)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run bot
        env:
          IG_COOKIES: ${{ secrets.IG_COOKIES }}
        run: node bot.js

      - name: Save engaged.txt back to repo
        if: always()
        run: |
          git config user.name  "instagram-bot"
          git config user.email "bot@designedby.surya"
          git add engaged.txt bot.log || true
          git diff --cached --quiet || git commit -m "bot run $(date -u +'%Y-%m-%d %H:%M')"
          git push || true
